<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airline Reservation System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>✈ Airline Reservation System</h1>
    <p>Flight Management • Reservation System • Records Display</p>
  </header>

  <main class="container">
    <section class="card">
      <h2>Flight Management</h2>
      <form id="addFlightForm" class="grid">
        <input name="origin" placeholder="Origin" required />
        <input name="destination" placeholder="Destination" required />
        <input name="date" placeholder="d/m/yyyy" required />
        <input name="departureTime" placeholder="HH:MM" required />
        <input name="arrivalTime" placeholder="HH:MM" required />
        <input name="ticketPrice" type="number" min="0" step="0.01" placeholder="Price" required />
        <input name="airline" placeholder="Airline" required />
        <button type="submit">Add Flight</button>
      </form>
      <div id="addFlightMsg" class="msg"></div>

      <h3>Search Flight</h3>
      <form id="searchFlightForm" class="grid">
        <input name="origin" placeholder="Origin" required />
        <input name="destination" placeholder="Destination" required />
        <input name="date" placeholder="d/m/yyyy" required />
        <select name="mode">
          <option value="direct">Direct (±1 day fallback)</option>
          <option value="min-time">Minimal travel time</option>
          <option value="by-airline">Specific airline (cost)</option>
          <option value="with-transit">With transit city</option>
        </select>
        <input name="airline" placeholder="Airline (if applicable)" />
        <input name="transit" placeholder="Transit city (if applicable)" />
        <button type="submit">Search</button>
      </form>
      <div id="searchResult"></div>
    </section>

    <section class="card">
      <h2>Reservation System</h2>
      <form id="bookForm" class="grid">
        <input name="passenger" placeholder="Passenger Name" required />
        <input name="origin" placeholder="Origin" required />
        <input name="destination" placeholder="Destination" required />
        <input name="date" placeholder="d/m/yyyy" required />
        <button type="submit">Book Reservation (Best by Cost)</button>
      </form>
      <div id="bookMsg" class="msg"></div>

      <form id="cancelForm" class="grid inline">
        <input name="reservationId" placeholder="Reservation ID" required />
        <button type="submit">Cancel Reservation</button>
      </form>
      <div id="cancelMsg" class="msg"></div>
    </section>

    <section class="card">
      <h2>Records Display</h2>
      <div class="actions">
        <button id="viewFlightsBtn">View All Flights</button>
        <button id="viewReservationsBtn">View All Reservations</button>
      </div>
      <div id="records"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
